<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4th of July Tree Preview - Background and No Background</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            /*
            * PREVIEW BOX SIZE
            * Increase 760px to allow a larger box on desktop.
            * Decrease 760px to keep the preview smaller everywhere.
            */
            --preview-max-width: 760px;

            /*
            * TREE SIZE INSIDE THE BOX
            * Increase 84% to make the tree larger inside the box.
            * Decrease 84% to add more space around the tree.
            */
            --tree-width: 84%;

            /*
            * MAXIMUM TREE SIZE
            * This prevents the tree from becoming too large on wide screens.
            */
            --tree-max-width: 650px;
        }

        h1 {
            margin: 0 0 1rem;
            color: #000000;
            font-family: Georgia, "Times New Roman", serif;

            /* Responsive font size */
            font-size: clamp(2rem, 6vw, 4.5rem);

            font-weight: 500;
            line-height: 1.05;
            letter-spacing: -0.04em;
            text-wrap: balance;

            /* Soft depth without looking too heavy */
            text-shadow: 0 3px 12px rgba(15, 70, 54, 0.14);
        }

        h1 {
            text-align: center;
        }

        h1::after {
            margin-right: auto;
            margin-left: auto;
        }

        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            min-height: 100svh;
            margin: 0;

            /*
            * Responsive page spacing:
            * 0.75rem on small screens and up to 2rem on large screens.
            */
            padding: clamp(0.75rem, 3vw, 2rem);

            background: #f3f4f6;
        }

        .tree-box {
            display: grid;
            place-items: center;
            width: min(
                92vw,
                var(--preview-max-width),
                calc(88svh * 16 / 21)
            );
            aspect-ratio: 16 / 21;
            overflow: hidden;
            border: 1px solid #d7dce3;
            border-radius: clamp(16px, 3vw, 32px);

            /* Background shown by default */
            background:
                radial-gradient(
                    circle at 20% 10%,
                    rgba(255, 255, 255, 0.08),
                    transparent 25rem
                ),
                linear-gradient(145deg, #061c3c, #8b172d);

            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        }

        /*
        * TRANSPARENT BACKGROUND OPTION
        *
        * Add "no-background" to the tree-box class in the HTML
        * to remove the green background, border, and shadow.
        */
        .tree-box.no-background {
            background: transparent;
            border-color: transparent;
            box-shadow: none;
        }

        .tree-box #tree {
            display: block;

            /*
            * Adjust --tree-width at the top of this CSS to resize the tree.
            * Example:
            * --tree-width: 92%; makes it larger.
            * --tree-width: 72%; makes it smaller.
            */
            width: min(var(--tree-width), var(--tree-max-width));

            /*
            * Prevents the SVG from becoming taller than the preview box.
            */
            max-height: 92%;
            height: auto;
        }

        /*
        * Small-phone adjustments.
        * The box uses more of the available width, while the tree remains contained.
        */
        @media (max-width: 480px) {
            :root {
                --tree-width: 88%;
            }

            .tree-box {
                width: min(
                    94vw,
                    var(--preview-max-width),
                    calc(86svh * 16 / 21)
                );

                border-radius: 18px;
            }
        }

        /*
        * Landscape-phone adjustment.
        * This prevents the tall box from extending below the screen.
        */
        @media (max-height: 520px) and (orientation: landscape) {
            .tree-box {
                width: min(
                    74vw,
                    var(--preview-max-width),
                    calc(82svh * 16 / 21)
                );
            }

            .tree-box #tree {
                max-height: 88%;
            }
        }
    </style>
</head>
